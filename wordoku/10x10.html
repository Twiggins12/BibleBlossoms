<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10-Symbol Shaped Wordoku Generator</title>
  <style>
    :root{
      --bg:#f6f6fb;
      --card:#ffffff;
      --text:#222;
      --line:#222;
      --thin:#999;
      --cell:56px;
      --block-gap:24px;
      --row-gap:26px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1500px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
      padding:20px;
      margin-bottom:20px;
    }

    h1{
      margin:0 0 10px 0;
      font-size:2rem;
    }

    p{
      margin:8px 0;
      line-height:1.45;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:14px;
    }

    .controls input,
    .controls button{
      font-size:16px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .controls button{
      cursor:pointer;
      background:#f2f2f7;
    }

    .controls button:hover{
      background:#e8e8ef;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid #ddd;
      border-radius:999px;
      padding:6px 10px;
      background:#fafafa;
      font-size:14px;
    }

    .swatch{
      width:18px;
      height:18px;
      border-radius:4px;
      border:1px solid rgba(0,0,0,0.25);
      flex:none;
    }

    .board-wrap{
      overflow:auto;
      padding:10px 0;
    }

    .puzzle{
      width:max-content;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4, auto);
      grid-template-areas:
        "b0 b1 b2 b3"
        ".  b4 b5 ."
        "b6 b7 b8 b9";
      gap:var(--row-gap) var(--block-gap);
      align-items:start;
      justify-items:center;
    }

    .block-0{ grid-area:b0; }
    .block-1{ grid-area:b1; }
    .block-2{ grid-area:b2; }
    .block-3{ grid-area:b3; }
    .block-4{ grid-area:b4; }
    .block-5{ grid-area:b5; }
    .block-6{ grid-area:b6; }
    .block-7{ grid-area:b7; }
    .block-8{ grid-area:b8; }
    .block-9{ grid-area:b9; }

    .block{
      display:flex;
      flex-direction:column;
      gap:0;
    }

    .block-row{
      display:flex;
      gap:0;
      justify-content:flex-start;
    }

    .block-row.top,
    .block-row.bottom{
      width:calc(var(--cell) * 4);
    }

    .block-row.middle{
      width:calc(var(--cell) * 4);
    }

    .cell{
      width:var(--cell);
      height:var(--cell);
      border:1px solid var(--thin);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      user-select:none;
    }

    .wide{
      width:calc(var(--cell) * 2);
    }

    /* outer border for each block */
    .block-row.top .cell{
      border-top:3px solid var(--line);
    }

    .block-row.bottom .cell{
      border-bottom:3px solid var(--line);
    }

    .block-row .cell:first-child{
      border-left:3px solid var(--line);
    }

    .block-row .cell:last-child{
      border-right:3px solid var(--line);
    }

    .hidden{
      color:transparent;
    }

    @media print{
      body{ background:#fff; }
      .no-print{ display:none !important; }
      .wrap{ max-width:none; padding:0; }
      .card{ box-shadow:none; border:none; padding:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card no-print">
      <h1>10-Symbol Shaped Wordoku Generator</h1>
      <p>Layout: 4 blocks / 2 centered blocks / 4 blocks.</p>
      <p>Each block has 3 rows: 4 cells, 2 wide cells, 4 cells.</p>

      <div class="controls">
        <label>
          Symbols:
          <input id="symbolsInput" type="text" value="ABCDEFGHIJ" size="14" />
        </label>

        <label>
          Clues:
          <input id="cluesInput" type="number" min="10" max="100" value="42" />
        </label>

        <button id="newBtn">New Solution + Puzzle</button>
        <button id="sameBtn">New Puzzle Same Solution</button>
        <button id="toggleBtn">Show Solution</button>
        <button id="printBtn">Print</button>
      </div>

      <div class="legend" id="legend"></div>
    </div>

    <div class="card">
      <div class="board-wrap">
        <div class="puzzle" id="puzzle"></div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = [
      "#fff3b0",
      "#c8f7c5",
      "#ffd6a5",
      "#d0ebff",
      "#f8c8dc",
      "#e9d5ff",
      "#c7f9cc",
      "#fde2e4",
      "#bee1e6",
      "#e2ece9"
    ];

    let currentSolution = null;
    let currentPuzzle = null;
    let showingSolution = false;

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getSymbols(){
      const raw = document.getElementById("symbolsInput").value.trim();
      const chars = [...raw];

      if(chars.length !== 10){
        alert("Please enter exactly 10 symbols.");
        return null;
      }
      if(new Set(chars).size !== 10){
        alert("All 10 symbols must be different.");
        return null;
      }
      return chars;
    }

    function clampClues(n){
      if(Number.isNaN(n)) return 42;
      return Math.max(10, Math.min(100, n));
    }

    function buildLatin(symbols){
      const n = 10;
      const rowPerm = shuffle([...Array(n).keys()]);
      const colPerm = shuffle([...Array(n).keys()]);
      const symPerm = shuffle([...Array(n).keys()]);

      return Array.from({length:n}, (_, r) =>
        Array.from({length:n}, (_, c) => {
          const base = (rowPerm[r] + colPerm[c]) % n;
          return symbols[symPerm[base]];
        })
      );
    }

    function makeSolution(symbols){
      const latin = buildLatin(symbols);

      // 10 blocks, each with 10 positions
      const blocks = Array.from({length:10}, (_, blockIndex) =>
        Array.from({length:10}, (_, posIndex) => latin[posIndex][blockIndex])
      );

      return { symbols, blocks };
    }

    function makePuzzle(solution, clues){
      const blocks = solution.blocks.map(block => [...block]);
      const coords = [];

      for(let b = 0; b < 10; b++){
        for(let p = 0; p < 10; p++){
          coords.push({b, p});
        }
      }

      const total = 100;
      const hideCount = total - clues;
      const shuffled = shuffle(coords);

      for(let i = 0; i < hideCount; i++){
        const {b, p} = shuffled[i];
        blocks[b][p] = "";
      }

      return { symbols: solution.symbols, blocks };
    }

    function makeLegend(){
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      COLORS.forEach((color, i) => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.background = color;

        const text = document.createElement("span");
        text.textContent = `Block ${i + 1}`;

        item.appendChild(swatch);
        item.appendChild(text);
        legend.appendChild(item);
      });
    }

    function makeCell(value, color, extraClass = ""){
      const div = document.createElement("div");
      div.className = `cell ${extraClass}`.trim();
      div.style.background = color;
      div.textContent = value || "";
      if(!value) div.classList.add("hidden");
      return div;
    }

    function renderBlock(values, blockIndex){
      const color = COLORS[blockIndex];
      const block = document.createElement("div");
      block.className = `block block-${blockIndex}`;

      const top = document.createElement("div");
      top.className = "block-row top";
      for(let i = 0; i < 4; i++){
        top.appendChild(makeCell(values[i], color));
      }

      const middle = document.createElement("div");
      middle.className = "block-row middle";
      middle.appendChild(makeCell(values[4], color, "wide"));
      middle.appendChild(makeCell(values[5], color, "wide"));

      const bottom = document.createElement("div");
      bottom.className = "block-row bottom";
      for(let i = 6; i < 10; i++){
        bottom.appendChild(makeCell(values[i], color));
      }

      block.appendChild(top);
      block.appendChild(middle);
      block.appendChild(bottom);

      return block;
    }

    function render(){
      const puzzle = document.getElementById("puzzle");
      puzzle.innerHTML = "";

      const data = showingSolution ? currentSolution : currentPuzzle;
      if(!data) return;

      for(let b = 0; b < 10; b++){
        puzzle.appendChild(renderBlock(data.blocks[b], b));
      }
    }

    function newSolutionAndPuzzle(){
      const symbols = getSymbols();
      if(!symbols) return;

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentSolution = makeSolution(symbols);
      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function newPuzzleSameSolution(){
      if(!currentSolution){
        newSolutionAndPuzzle();
        return;
      }

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function toggleSolution(){
      if(!currentSolution) return;
      showingSolution = !showingSolution;
      document.getElementById("toggleBtn").textContent =
        showingSolution ? "Show Puzzle" : "Show Solution";
      render();
    }

    document.getElementById("newBtn").addEventListener("click", newSolutionAndPuzzle);
    document.getElementById("sameBtn").addEventListener("click", newPuzzleSameSolution);
    document.getElementById("toggleBtn").addEventListener("click", toggleSolution);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    makeLegend();
    newSolutionAndPuzzle();
  </script>
</body>
</html>
