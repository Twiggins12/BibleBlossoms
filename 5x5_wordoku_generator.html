<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5-Symbol Pyramid Wordoku Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    max-width: 950px;
    margin: 0 auto 20px auto;
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .controls input,
  .controls select,
  .controls button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #bbb;
  }

  .controls button {
    cursor: pointer;
    background: #2f6fed;
    color: white;
    border: none;
  }

  .controls button:hover {
    background: #2458bc;
  }

  .note {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
  }

  .error {
    color: #b30000;
    font-weight: bold;
    margin-top: 10px;
    min-height: 24px;
  }

  .boards {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
    margin-top: 20px;
  }

  .board-wrap {
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    min-width: 360px;
  }

  .board-title {
    font-size: 22px;
    margin-bottom: 12px;
    font-weight: bold;
  }

  .shape-board {
    display: inline-flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .shape-row {
    display: flex;
    gap: 0;
    justify-content: center;
    align-items: center;
  }

  .cell, .spacer {
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-size: 24px;
    font-weight: bold;
    user-select: none;
  }

  .cell {
    border: 1px solid #444;
  }

  .wide {
    width: 84px;
  }

  .spacer {
    visibility: hidden;
  }

  .spacer.w1 { width: 42px; }
  .spacer.w2 { width: 84px; }

  .blank {
    color: transparent;
    background: #fff !important;
    border: 2px dashed #999 !important;
  }

  .print-buttons {
    margin-top: 16px;
  }

  .print-buttons button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    background: #666;
    color: white;
    cursor: pointer;
  }

  .print-buttons button:hover {
    background: #444;
  }

  @media print {
    .controls,
    .error,
    .print-buttons {
      display: none !important;
    }

    body {
      background: white;
      margin: 10px;
    }

    .boards {
      display: block;
    }

    .board-wrap {
      box-shadow: none;
      border: 1px solid #ccc;
      margin: 0 auto 20px auto;
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>

<h1>5-Symbol Pyramid Wordoku Generator</h1>

<div class="controls">
  <div>
    <input id="symbolInput" type="text" maxlength="5" placeholder="Enter 5 unique letters/numbers" />
    <select id="difficulty">
      <option value="17">Easy (17 clues)</option>
      <option value="14" selected>Medium (14 clues)</option>
      <option value="11">Hard (11 clues)</option>
      <option value="9">Very Hard (9 clues)</option>
    </select>
    <button id="generateBtn">Generate Puzzle</button>
    <button id="solutionBtn">Generate New Solution Only</button>
  </div>

  <div class="note">
    Use exactly 5 unique symbols, such as <b>ABCDE</b>, <b>12345</b>, or <b>A1B2C</b>.
  </div>

  <div class="note">
    Rule: No repeats within the same section or row, except row 5.
  </div>

  <div class="error" id="errorBox"></div>
</div>

<div class="boards">
  <div class="board-wrap">
    <div class="board-title">Puzzle</div>
    <div id="puzzleBoard" class="shape-board"></div>
  </div>

  <div class="board-wrap">
    <div class="board-title">Solution</div>
    <div id="solutionBoard" class="shape-board"></div>
  </div>
</div>

<div class="print-buttons">
  <button onclick="window.print()">Print / Save as PDF</button>
</div>
