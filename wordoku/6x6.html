<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Blossoms | 6x6 WORDoku</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/wordoku.css">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
</head>
<body>

<header id="top">
  <h1>Bible Blossoms</h1>
</header>

<div class="page-content">
  <div id="domain-top-left">
    <a href="../index.html">BibleBlossoms</a>
  </div>

  <section class="hero">
    <h2>6x6 WORDoku</h2>
    <p>Preview, download, print, or reveal answers for these 6x6 puzzles.</p>
  </section>

  <div class="cards-container">

    <!-- Puzzle 1 -->
    <div class="card">
      <h3>Puzzle 1</h3>
      <img src="../images/6x6_he_is_risen.png" alt="6x6 WORDoku Puzzle 1 preview">
      <div class="card-buttons">
        <a href="../downloads/wordoku/6x6_he_is_risen.pdf" download>Download</a>
        <a href="../images/6x6_he_is_risen.png" class="print-btn">Print</a>
        <a href="#" class="show-answer-btn">Answer</a>
      </div>
      <div class="solution" style="display:none; margin-top:10px;">
        <img src="../images/6x6_he_is_risen_solution.png" alt="Puzzle 1 solution">
      </div>
    </div>

    <!-- Puzzle 2 -->
    <div class="card">
      <h3>Puzzle 2</h3>
      <img src="../images/6x6_truth_set_free.png" alt="6x6 WORDoku Puzzle 2 preview">
      <div class="card-buttons">
        <a href="../downloads/wordoku/6x6_truth_set_free.pdf" download>Download</a>
        <a href="../images/6x6_truth_set_free.png" class="print-btn">Print</a>
  <a href="#" class="show-answer-btn">Answer</a>
      </div>
      <div class="solution" style="display:none; margin-top:10px;">
        <img src="../images/6x6_truth_set_free_solution.png" alt="Puzzle 2 solution">
      </div>
    </div>

    <!-- Add more puzzles here, just copy the structure above -->

  </div>
</div>

<footer class="site-footer">
  <a href="../index.html">Home</a>

  <a href="#top">Top</a>

<!-- JS for Show Answer Buttons -->
<script>
  // Show/Hide Answer
  document.querySelectorAll('.show-answer-btn').forEach(button => {
    button.addEventListener('click', function(e) {
      e.preventDefault(); // 👈 prevents jump to top

      const card = this.closest('.card');
      const solution = card.querySelector('.solution');

      if (solution) {
        if (solution.style.display === 'none') {
          solution.style.display = 'block';
          this.innerText = 'Hide';
        } else {
          solution.style.display = 'none';
          this.innerText = 'Answer';
        }
      }
    });
  });

  // Print Image
  document.querySelectorAll('.print-btn').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();

      const imageUrl = this.getAttribute('href');

      const printWindow = window.open('', '_blank');

      printWindow.document.write(`
        <html>
          <head>
            <title>Print Puzzle</title>
            <style>
              body {
                margin: 0;
                text-align: center;
              }
              img {
                max-width: 100%;
                height: auto;
              }
            </style>
          </head>
          <body>
            <img src="${imageUrl}" onload="window.print(); window.close();" />
          </body>
        </html>
      `);

      printWindow.document.close();
    });
  });
</script>

</body>
</html>
