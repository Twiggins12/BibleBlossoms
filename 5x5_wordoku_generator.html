<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5-Symbol Shaped Wordoku Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    max-width: 900px;
    margin: 0 auto 20px auto;
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .controls input,
  .controls select,
  .controls button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #bbb;
  }

  .controls button {
    cursor: pointer;
    background: #2f6fed;
    color: white;
    border: none;
  }

  .controls button:hover {
    background: #2458bc;
  }

  .note {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
  }

  .error {
    color: #b30000;
    font-weight: bold;
    margin-top: 10px;
    min-height: 24px;
  }

  .boards {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
    margin-top: 20px;
  }

  .board-wrap {
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    min-width: 320px;
  }

  .board-title {
    font-size: 22px;
    margin-bottom: 12px;
    font-weight: bold;
  }

  .shape-board {
    display: inline-flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .shape-row {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .cell, .spacer {
    width: 46px;
    height: 46px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-size: 24px;
    font-weight: bold;
    border-radius: 6px;
  }

  .cell {
    border: 1px solid #444;
    user-select: none;
  }

  .spacer {
    visibility: hidden;
  }

  .given {
    color: #111;
  }

  .blank {
    color: transparent;
    background: #fff !important;
    border: 2px dashed #999;
  }

  .print-buttons {
    margin-top: 16px;
  }

  .print-buttons button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    background: #666;
    color: white;
    cursor: pointer;
  }

  .print-buttons button:hover {
    background: #444;
  }

  @media print {
    .controls,
    .error,
    .print-buttons {
      display: none !important;
    }

    body {
      background: white;
      margin: 10px;
    }

    .boards {
      display: block;
    }

    .board-wrap {
      box-shadow: none;
      border: 1px solid #ccc;
      margin: 0 auto 20px auto;
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>

<h1>5-Symbol Shaped Wordoku Generator</h1>

<div class="controls">
  <div>
    <input id="symbolInput" type="text" maxlength="5" placeholder="Enter 5 unique letters/numbers" />
    <select id="difficulty">
      <option value="16">Easy (16 clues)</option>
      <option value="13" selected>Medium (13 clues)</option>
      <option value="10">Hard (10 clues)</option>
      <option value="8">Very Hard (8 clues)</option>
    </select>
    <button id="generateBtn">Generate Puzzle</button>
    <button id="solutionBtn">Generate New Solution Only</button>
  </div>

  <div class="note">
    Use exactly 5 unique symbols, such as <b>ABCDE</b>, <b>12345</b>, or <b>A1B2C</b>.
  </div>

  <div class="note">
    Rule: No repeats within the same color block or row, except row 4.
  </div>

  <div class="error" id="errorBox"></div>
</div>

<div class="boards">
  <div class="board-wrap">
    <div class="board-title">Puzzle</div>
    <div id="puzzleBoard" class="shape-board"></div>
  </div>

  <div class="board-wrap">
    <div class="board-title">Solution</div>
    <div id="solutionBoard" class="shape-board"></div>
  </div>
</div>

<div class="print-buttons">
  <button onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
/*
  25-cell diamond layout:

  R1: ---A---
  R2: --BCD--
  R3: -CDEAB-
  R4: DEABCDE   <-- exempt row
  R5: -BCDEA-
  R6: --EAB--
  R7: ---C---

  Each group A-E appears exactly 5 times.
*/

const layout = [
  "---A---",
  "--BCD--",
  "-CDEAB-",
  "DEABCDE",
  "-BCDEA-",
  "--EAB--",
  "---C---"
];

const colorStyles = {
  A: "#f5e663", // yellow
  B: "#8fd18f", // green
  C: "#8fc5ff", // blue
  D: "#ffffff", // white
  E: "#ffb6d9"  // pink
};

const rowConstraintApplies = rowIndex => rowIndex !== 3; // row 4 exempt

const puzzleBoardEl = document.getElementById("puzzleBoard");
const solutionBoardEl = document.getElementById("solutionBoard");
const generateBtn = document.getElementById("generateBtn");
const solutionBtn = document.getElementById("solutionBtn");
const symbolInput = document.getElementById("symbolInput");
const difficultySelect = document.getElementById("difficulty");
const errorBox = document.getElementById("errorBox");

let positions = [];
let groupsByColor = {};
let groupsByRow = [];
let lastSolution = null;
let lastPuzzle = null;
let lastSymbols = null;

function buildStructure() {
  positions = [];
  groupsByColor = {};
  groupsByRow = layout.map(() => []);

  const colorKeys = ["A", "B", "C", "D", "E"];
  colorKeys.forEach(c => groupsByColor[c] = []);

  let index = 0;

  layout.forEach((rowStr, r) => {
    for (let c = 0; c < rowStr.length; c++) {
      const ch = rowStr[c];
      if (ch !== "-") {
        const pos = {
          index,
          row: r,
          col: c,
          color: ch
        };
        positions.push(pos);
        groupsByColor[ch].push(index);
        groupsByRow[r].push(index);
        index++;
      }
    }
  });
}

buildStructure();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function validateSymbols(raw) {
  const cleaned = raw.trim().toUpperCase().replace(/\s+/g, "");
  if (cleaned.length !== 5) {
    return { ok: false, message: "Please enter exactly 5 symbols." };
  }
  const chars = cleaned.split("");
  const unique = new Set(chars);
  if (unique.size !== 5) {
    return { ok: false, message: "All 5 symbols must be different." };
  }
  if (!/^[A-Z0-9]+$/.test(cleaned)) {
    return { ok: false, message: "Use letters and/or numbers only." };
  }
  return { ok: true, symbols: chars };
}

function getPeers(index) {
  const pos = positions[index];
  const peers = new Set();

  for (const i of groupsByColor[pos.color]) {
    if (i !== index) peers.add(i);
  }

  if (rowConstraintApplies(pos.row)) {
    for (const i of groupsByRow[pos.row]) {
      if (i !== index) peers.add(i);
    }
  }

  return [...peers];
}

const peerMap = positions.map((_, i) => getPeers(i));

function getAllowedSymbols(board, index, symbols) {
  const used = new Set();
  for (const p of peerMap[index]) {
    if (board[p] !== null) used.add(board[p]);
  }
  return symbols.filter(s => !used.has(s));
}

function chooseUnfilledCell(board, symbols) {
  let bestIndex = -1;
  let bestOptions = null;

  for (let i = 0; i < board.length; i++) {
    if (board[i] === null) {
      const options = getAllowedSymbols(board, i, symbols);
      if (options.length === 0) return { index: i, options: [] };
      if (bestOptions === null || options.length < bestOptions.length) {
        bestIndex = i;
        bestOptions = options;
        if (options.length === 1) break;
      }
    }
  }

  return { index: bestIndex, options: bestOptions || [] };
}

function generateSolution(symbols) {
  const board = Array(positions.length).fill(null);

  function backtrack() {
    const { index, options } = chooseUnfilledCell(board, symbols);

    if (index === -1) return true;
    if (options.length === 0) return false;

    for (const sym of shuffle(options)) {
      board[index] = sym;
      if (backtrack()) return true;
      board[index] = null;
    }

    return false;
  }

  const ok = backtrack();
  return ok ? board.slice() : null;
}

function countSolutions(puzzle, symbols, limit = 2) {
  const board = puzzle.slice();
  let count = 0;

  function solve() {
    if (count >= limit) return;

    const { index, options } = chooseUnfilledCell(board, symbols);

    if (index === -1) {
      count++;
      return;
    }

    if (options.length === 0) return;

    for (const sym of options) {
      board[index] = sym;
      solve();
      board[index] = null;
      if (count >= limit) return;
    }
  }

  solve();
  return count;
}

function generatePuzzleFromSolution(solution, symbols, cluesToKeep) {
  const puzzle = solution.slice();
  const cellOrder = shuffle([...Array(solution.length).keys()]);

  for (const index of cellOrder) {
    const backup = puzzle[index];
    puzzle[index] = null;

    const solutions = countSolutions(puzzle, symbols, 2);
    if (solutions !== 1) {
      puzzle[index] = backup;
    }

    const currentClues = puzzle.filter(v => v !== null).length;
    if (currentClues <= cluesToKeep) break;
  }

  return puzzle;
}

function renderBoard(boardEl, board, hideNulls = false) {
  boardEl.innerHTML = "";

  const positionLookup = {};
  positions.forEach(pos => {
    positionLookup[`${pos.row}_${pos.col}`] = pos.index;
  });

  layout.forEach((rowStr, r) => {
    const rowEl = document.createElement("div");
    rowEl.className = "shape-row";

    for (let c = 0; c < rowStr.length; c++) {
      const ch = rowStr[c];

      if (ch === "-") {
        const spacer = document.createElement("div");
        spacer.className = "spacer";
        rowEl.appendChild(spacer);
      } else {
        const index = positionLookup[`${r}_${c}`];
        const val = board ? board[index] : null;

        const cell = document.createElement("div");
        cell.className = "cell";
        cell.style.background = colorStyles[ch];
        cell.textContent = val === null ? "" : val;

        if (val === null && hideNulls) {
          cell.classList.add("blank");
          cell.textContent = "";
        } else {
          cell.classList.add("given");
        }

        rowEl.appendChild(cell);
      }
    }

    boardEl.appendChild(rowEl);
  });
}

function showError(msg) {
  errorBox.textContent = msg || "";
}

function doGenerate(makePuzzleToo = true) {
  showError("");

  const valid = validateSymbols(symbolInput.value);
  if (!valid.ok) {
    showError(valid.message);
    return;
  }

  const symbols = valid.symbols;
  const cluesToKeep = parseInt(difficultySelect.value, 10);

  let solution = null;

  for (let tries = 0; tries < 50; tries++) {
    solution = generateSolution(symbols);
    if (solution) break;
  }

  if (!solution) {
    showError("Could not generate a valid solution. Try again.");
    return;
  }

  lastSolution = solution.slice();
  lastSymbols = symbols.slice();

  renderBoard(solutionBoardEl, lastSolution, false);

  if (makePuzzleToo) {
    let puzzle = null;

    for (let tries = 0; tries < 10; tries++) {
      puzzle = generatePuzzleFromSolution(lastSolution, lastSymbols, cluesToKeep);
      if (puzzle) break;
    }

    if (!puzzle) {
      showError("Could not generate a puzzle from that solution.");
      renderBoard(puzzleBoardEl, lastSolution, false);
      return;
    }

    lastPuzzle = puzzle.slice();
    renderBoard(puzzleBoardEl, lastPuzzle, true);
  } else {
    lastPuzzle = null;
    renderBoard(puzzleBoardEl, Array(positions.length).fill(null), true);
  }
}

generateBtn.addEventListener("click", () => doGenerate(true));
solutionBtn.addEventListener("click", () => doGenerate(false));

symbolInput.value = "ABCDE";
renderBoard(puzzleBoardEl, Array(positions.length).fill(null), true);
renderBoard(solutionBoardEl, Array(positions.length).fill(null), true);
</script>

</body>
</html>
