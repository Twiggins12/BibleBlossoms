<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10-Symbol Shaped Wordoku Generator</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --line:#222;
      --thin:#b9b9c5;

      --cell:58px;
      --block-gap:20px;
      --row-gap:20px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
      padding:20px;
      margin-bottom:20px;
    }

    h1{
      margin:0 0 10px 0;
      font-size:2rem;
    }

    p{
      line-height:1.45;
      margin:8px 0;
    }

    .muted{
      color:var(--muted);
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:14px;
    }

    .controls input,
    .controls button{
      font-size:16px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .controls button{
      cursor:pointer;
      background:#f2f2f7;
    }

    .controls button:hover{
      background:#e8e8ef;
    }

    .board-wrap{
      overflow:auto;
      padding:10px 0;
    }

    /* Main layout:
       4 blocks on top
       2 blocks in middle centered under top blocks 2 and 3
       4 blocks on bottom
    */
    .puzzle{
      width:max-content;
      margin:0 auto;
      display:grid;
      grid-template-columns:
        auto auto auto auto;
      grid-template-areas:
        "b0 b1 b2 b3"
        ".  b4 b5 ."
        "b6 b7 b8 b9";
      column-gap:var(--block-gap);
      row-gap:var(--row-gap);
      align-items:start;
      justify-items:center;
    }

    .block{
      width:calc(var(--cell) * 4);
      display:grid;
      grid-template-columns:repeat(4, var(--cell));
      grid-template-rows:var(--cell) var(--cell) var(--cell);
      border:3px solid var(--line);
      background:#fff;
    }

    .block-0{ grid-area:b0; }
    .block-1{ grid-area:b1; }
    .block-2{ grid-area:b2; }
    .block-3{ grid-area:b3; }
    .block-4{ grid-area:b4; }
    .block-5{ grid-area:b5; }
    .block-6{ grid-area:b6; }
    .block-7{ grid-area:b7; }
    .block-8{ grid-area:b8; }
    .block-9{ grid-area:b9; }

    .cell{
      border:1px solid var(--thin);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      user-select:none;
    }

    .wide{
      grid-column:span 2;
    }

    .hidden{
      color:transparent;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid #ddd;
      border-radius:999px;
      padding:6px 10px;
      background:#fafafa;
      font-size:14px;
    }

    .swatch{
      width:18px;
      height:18px;
      border-radius:4px;
      border:1px solid rgba(0,0,0,0.25);
      flex:none;
    }

    @media print{
      body{ background:#fff; }
      .no-print{ display:none !important; }
      .wrap{ max-width:none; padding:0; }
      .card{ box-shadow:none; border:none; padding:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card no-print">
      <h1>10-Symbol Shaped Wordoku Generator</h1>
      <p>
        Enter exactly 10 different symbols. This makes a puzzle with
        10 colored blocks arranged as 4 / 2 / 4.
      </p>
      <p class="muted">
        Each block contains all 10 symbols once. The row rule is enforced across
        matching positions in all 10 blocks.
      </p>

      <div class="controls">
        <label>
          Symbols:
          <input id="symbolsInput" type="text" value="ABCDEFGHIJ" size="14" />
        </label>

        <label>
          Clues:
          <input id="cluesInput" type="number" min="10" max="100" value="42" />
        </label>

        <button id="newBtn">New Solution + Puzzle</button>
        <button id="sameBtn">New Puzzle Same Solution</button>
        <button id="toggleBtn">Show Solution</button>
        <button id="printBtn">Print</button>
      </div>

      <div class="legend" id="legend"></div>
    </div>

    <div class="card">
      <div class="board-wrap">
        <div class="puzzle" id="puzzle"></div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = [
      "#fff3b0", // yellow
      "#c8f7c5", // green
      "#ffd6a5", // peach
      "#d0ebff", // blue
      "#f8c8dc", // pink
      "#e9d5ff", // lavender
      "#c7f9cc", // mint
      "#fde2e4", // rose
      "#bee1e6", // aqua
      "#e2ece9"  // sage
    ];

    let currentSolution = null;
    let currentPuzzle = null;
    let showingSolution = false;

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getSymbols(){
      const raw = document.getElementById("symbolsInput").value.trim();
      const chars = [...raw];

      if(chars.length !== 10){
        alert("Please enter exactly 10 symbols.");
        return null;
      }

      if(new Set(chars).size !== 10){
        alert("All 10 symbols must be different.");
        return null;
      }

      return chars;
    }

    function clampClues(n){
      if(Number.isNaN(n)) return 42;
      return Math.max(10, Math.min(100, n));
    }

    // Build a 10x10 Latin square with random row/column/symbol permutations
    // Rows = local positions 0..9 inside a block
    // Cols = block index 0..9
    function buildLatin(symbols){
      const n = 10;
      const rowPerm = shuffle([...Array(n).keys()]);
      const colPerm = shuffle([...Array(n).keys()]);
      const symPerm = shuffle([...Array(n).keys()]);

      const grid = Array.from({length:n}, (_, r) =>
        Array.from({length:n}, (_, c) => {
          const base = (rowPerm[r] + colPerm[c]) % n;
          return symbols[symPerm[base]];
        })
      );

      return grid;
    }

    function makeSolution(symbols){
      const latin = buildLatin(symbols);

      // Convert into 10 blocks, each block has 10 positions
      const blocks = Array.from({length:10}, (_, blockIndex) =>
        Array.from({length:10}, (_, posIndex) => latin[posIndex][blockIndex])
      );

      return { symbols, blocks };
    }

    function makePuzzle(solution, clues){
      const blocks = solution.blocks.map(block => [...block]);
      const total = 100;
      const hideCount = total - clues;

      const coords = [];
      for(let b = 0; b < 10; b++){
        for(let p = 0; p < 10; p++){
          coords.push({b, p});
        }
      }

      const shuffled = shuffle(coords);
      for(let i = 0; i < hideCount; i++){
        const {b, p} = shuffled[i];
        blocks[b][p] = "";
      }

      return { symbols: solution.symbols, blocks };
    }

    function makeLegend(){
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      COLORS.forEach((color, i) => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.background = color;

        const text = document.createElement("span");
        text.textContent = `Block ${i + 1}`;

        item.appendChild(swatch);
        item.appendChild(text);
        legend.appendChild(item);
      });
    }

    function cell(text, bg, extraClass = ""){
      const div = document.createElement("div");
      div.className = `cell ${extraClass}`.trim();
      div.style.background = bg;
      div.textContent = text || "";
      if(!text) div.classList.add("hidden");
      return div;
    }

    function renderBlock(values, blockIndex){
      const bg = COLORS[blockIndex];
      const block = document.createElement("div");
      block.className = `block block-${blockIndex}`;

      // row 1: 4 cells (positions 0..3)
      for(let i = 0; i < 4; i++){
        block.appendChild(cell(values[i], bg));
      }

      // row 2: 2 wide cells (positions 4..5)
      block.appendChild(cell(values[4], bg, "wide"));
      block.appendChild(cell(values[5], bg, "wide"));

      // row 3: 4 cells (positions 6..9)
      for(let i = 6; i < 10; i++){
        block.appendChild(cell(values[i], bg));
      }

      return block;
    }

    function render(){
      const container = document.getElementById("puzzle");
      container.innerHTML = "";

      const data = showingSolution ? currentSolution : currentPuzzle;
      if(!data) return;

      for(let b = 0; b < 10; b++){
        container.appendChild(renderBlock(data.blocks[b], b));
      }
    }

    function newSolutionAndPuzzle(){
      const symbols = getSymbols();
      if(!symbols) return;

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentSolution = makeSolution(symbols);
      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function newPuzzleSameSolution(){
      if(!currentSolution){
        newSolutionAndPuzzle();
        return;
      }

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function toggleSolution(){
      if(!currentSolution) return;
      showingSolution = !showingSolution;
      document.getElementById("toggleBtn").textContent =
        showingSolution ? "Show Puzzle" : "Show Solution";
      render();
    }

    document.getElementById("newBtn").addEventListener("click", newSolutionAndPuzzle);
    document.getElementById("sameBtn").addEventListener("click", newPuzzleSameSolution);
    document.getElementById("toggleBtn").addEventListener("click", toggleSolution);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    makeLegend();
    newSolutionAndPuzzle();
  </script>
</body>
</html>
