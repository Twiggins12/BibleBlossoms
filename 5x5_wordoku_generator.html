<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5-Symbol Section Wordoku Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    max-width: 950px;
    margin: 0 auto 20px auto;
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .controls input,
  .controls select,
  .controls button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #bbb;
  }

  .controls button {
    cursor: pointer;
    background: #2f6fed;
    color: white;
    border: none;
  }

  .controls button:hover {
    background: #2458bc;
  }

  .note {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
  }

  .error {
    color: #b30000;
    font-weight: bold;
    margin-top: 10px;
    min-height: 24px;
  }

  .boards {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
    margin-top: 20px;
  }

  .board-wrap {
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    min-width: 380px;
  }

  .board-title {
    font-size: 22px;
    margin-bottom: 12px;
    font-weight: bold;
  }

  .shape-board {
    display: inline-flex;
    flex-direction: column;
    gap: 0;
    align-items: center;
  }

  .shape-row {
    display: flex;
    gap: 0;
    justify-content: center;
    align-items: center;
    min-height: 44px;
  }

  .cell, .spacer {
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-size: 24px;
    font-weight: bold;
    user-select: none;
  }

  .cell {
    border: 1px solid #444;
  }

  .wide {
    width: 88px;
  }

  .spacer {
    visibility: hidden;
  }

  .spacer.w1 { width: 44px; }
  .spacer.w2 { width: 88px; }

  .blank {
    color: transparent;
    background: #fff !important;
    border: 2px dashed #999 !important;
  }

  .print-buttons {
    margin-top: 16px;
  }

  .print-buttons button {
    margin: 6px;
    padding: 10px 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    background: #666;
    color: white;
    cursor: pointer;
  }

  .print-buttons button:hover {
    background: #444;
  }

  @media print {
    .controls,
    .error,
    .print-buttons {
      display: none !important;
    }

    body {
      background: white;
      margin: 10px;
    }

    .boards {
      display: block;
    }

    .board-wrap {
      box-shadow: none;
      border: 1px solid #ccc;
      margin: 0 auto 20px auto;
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>

<h1>5-Symbol Section Wordoku Generator</h1>

<div class="controls">
  <div>
    <input id="symbolInput" type="text" maxlength="5" placeholder="Enter 5 unique letters/numbers" />
    <select id="difficulty">
      <option value="17">Easy (17 clues)</option>
      <option value="14" selected>Medium (14 clues)</option>
      <option value="11">Hard (11 clues)</option>
      <option value="9">Very Hard (9 clues)</option>
    </select>
    <button id="generateBtn">Generate Puzzle</button>
    <button id="solutionBtn">Generate New Solution Only</button>
  </div>

  <div class="note">
    Use exactly 5 unique symbols, such as <b>ABCDE</b>, <b>12345</b>, or <b>A1B2C</b>.
  </div>

  <div class="note">
    Rule: No repeats within the same section or row.
  </div>

  <div class="error" id="errorBox"></div>
</div>

<div class="boards">
  <div class="board-wrap">
    <div class="board-title">Puzzle</div>
    <div id="puzzleBoard" class="shape-board"></div>
  </div>

  <div class="board-wrap">
    <div class="board-title">Solution</div>
    <div id="solutionBoard" class="shape-board"></div>
  </div>
</div>

<div class="print-buttons">
  <button onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
/*
  5 sections, 5 cells each, arranged 2 / 1 / 2

  Each section:
  row 1 = 2 normal cells
  row 2 = 1 wide cell
  row 3 = 2 normal cells

  Top:    A A | B B
          A   | B
          A A | B B

  Middle:   C C
             C
            C C

  Bottom: D D | E E
          D   | E
          D D | E E

  Logical rows:
  R1: A A B B
  R2: A B
  R3: A A B B
  R4: C C
  R5: C       <-- exempt row
  R6: C C
  R7: D D E E
  R8: D E
  R9: D D E E
*/

const logicalRows = [
  ["A","A","B","B"],
  ["A","B"],
  ["A","A","B","B"],
  ["C","C"],
  ["C"],
  ["C","C"],
  ["D","D","E","E"],
  ["D","E"],
  ["D","D","E","E"]
];

const visualRows = [
  [
    { type: "cell", color: "A" },
    { type: "cell", color: "A" },
    { type: "cell", color: "B" },
    { type: "cell", color: "B" }
  ],
  [
    { type: "cell", color: "A", wide: true },
    { type: "cell", color: "B", wide: true }
  ],
  [
    { type: "cell", color: "A" },
    { type: "cell", color: "A" },
    { type: "cell", color: "B" },
    { type: "cell", color: "B" }
  ],
  [
    { type: "spacer", width: 1 },
    { type: "cell", color: "C" },
    { type: "cell", color: "C" },
    { type: "spacer", width: 1 }
  ],
  [
    { type: "spacer", width: 2 },
    { type: "cell", color: "C", wide: true },
    { type: "spacer", width: 2 }
  ],
  [
    { type: "spacer", width: 1 },
    { type: "cell", color: "C" },
    { type: "cell", color: "C" },
    { type: "spacer", width: 1 }
  ],
  [
    { type: "cell", color: "D" },
    { type: "cell", color: "D" },
    { type: "cell", color: "E" },
    { type: "cell", color: "E" }
  ],
  [
    { type: "cell", color: "D", wide: true },
    { type: "cell", color: "E", wide: true }
  ],
  [
    { type: "cell", color: "D" },
    { type: "cell", color: "D" },
    { type: "cell", color: "E" },
    { type: "cell", color: "E" }
  ]
];

const colorStyles = {
  A: "#f5e663",
  B: "#8fd18f",
  C: "#8fc5ff",
  D: "#ffffff",
  E: "#ffb6d9"
};

const rowConstraintApplies = rowIndex => true;

const puzzleBoardEl = document.getElementById("puzzleBoard");
const solutionBoardEl = document.getElementById("solutionBoard");
const generateBtn = document.getElementById("generateBtn");
const solutionBtn = document.getElementById("solutionBtn");
const symbolInput = document.getElementById("symbolInput");
const difficultySelect = document.getElementById("difficulty");
const errorBox = document.getElementById("errorBox");

let positions = [];
let groupsByColor = {};
let groupsByRow = [];
let peerMap = [];

function buildStructure() {
  positions = [];
  groupsByColor = { A: [], B: [], C: [], D: [], E: [] };
  groupsByRow = logicalRows.map(() => []);

  let index = 0;

  logicalRows.forEach((row, r) => {
    row.forEach((color, c) => {
      positions.push({ index, row: r, col: c, color: color });
      groupsByColor[color].push(index);
      groupsByRow[r].push(index);
      index++;
    });
  });

  peerMap = positions.map((pos, index) => {
    const peers = new Set();

    groupsByColor[pos.color].forEach(i => {
      if (i !== index) peers.add(i);
    });

    if (rowConstraintApplies(pos.row)) {
      groupsByRow[pos.row].forEach(i => {
        if (i !== index) peers.add(i);
      });
    }

    return [...peers];
  });
}

buildStructure();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = a[i];
    a[i] = a[j];
    a[j] = temp;
  }
  return a;
}

function validateSymbols(raw) {
  const cleaned = raw.trim().toUpperCase().replace(/\s+/g, "");
  if (cleaned.length !== 5) {
    return { ok: false, message: "Please enter exactly 5 symbols." };
  }
  const chars = cleaned.split("");
  if (new Set(chars).size !== 5) {
    return { ok: false, message: "All 5 symbols must be different." };
  }
  if (!/^[A-Z0-9]+$/.test(cleaned)) {
    return { ok: false, message: "Use letters and/or numbers only." };
  }
  return { ok: true, symbols: chars };
}

function getAllowedSymbols(board, index, symbols) {
  const used = new Set();
  peerMap[index].forEach(p => {
    if (board[p] !== null) used.add(board[p]);
  });
  return symbols.filter(s => !used.has(s));
}

function chooseUnfilledCell(board, symbols) {
  let bestIndex = -1;
  let bestOptions = null;

  for (let i = 0; i < board.length; i++) {
    if (board[i] === null) {
      const options = getAllowedSymbols(board, i, symbols);

      if (options.length === 0) {
        return { index: i, options: [] };
      }

      if (bestOptions === null || options.length < bestOptions.length) {
        bestIndex = i;
        bestOptions = options;
        if (options.length === 1) break;
      }
    }
  }

  return { index: bestIndex, options: bestOptions || [] };
}

function generateSolution(symbols) {
  const board = Array(positions.length).fill(null);

  function backtrack() {
    const pick = chooseUnfilledCell(board, symbols);
    const index = pick.index;
    const options = pick.options;

    if (index === -1) return true;
    if (options.length === 0) return false;

    const shuffled = shuffle(options);

    for (const sym of shuffled) {
      board[index] = sym;
      if (backtrack()) return true;
      board[index] = null;
    }

    return false;
  }

  return backtrack() ? board.slice() : null;
}

function countSolutions(puzzle, symbols, limit = 2) {
  const board = puzzle.slice();
  let count = 0;

  function solve() {
    if (count >= limit) return;

    const pick = chooseUnfilledCell(board, symbols);
    const index = pick.index;
    const options = pick.options;

    if (index === -1) {
      count++;
      return;
    }

    if (options.length === 0) return;

    for (const sym of options) {
      board[index] = sym;
      solve();
      board[index] = null;
      if (count >= limit) return;
    }
  }

  solve();
  return count;
}

function generatePuzzleFromSolution(solution, symbols, cluesToKeep) {
  const puzzle = solution.slice();
  const order = shuffle([...Array(solution.length).keys()]);

  for (const index of order) {
    const backup = puzzle[index];
    puzzle[index] = null;

    if (countSolutions(puzzle, symbols, 2) !== 1) {
      puzzle[index] = backup;
    }

    const currentClues = puzzle.filter(v => v !== null).length;
    if (currentClues <= cluesToKeep) break;
  }

  return puzzle;
}

function renderBoard(boardEl, board, hideNulls) {
  boardEl.innerHTML = "";
  let boardIndex = 0;

  visualRows.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "shape-row";

    row.forEach(item => {
      if (item.type === "spacer") {
        const spacer = document.createElement("div");
        spacer.className = "spacer w" + item.width;
        rowEl.appendChild(spacer);
      } else {
        const val = board ? board[boardIndex] : null;
        const cell = document.createElement("div");
        cell.className = "cell";
        if (item.wide) cell.classList.add("wide");
        cell.style.background = colorStyles[item.color];
        cell.textContent = val === null ? "" : val;

        if (val === null && hideNulls) {
          cell.classList.add("blank");
        }

        rowEl.appendChild(cell);
        boardIndex++;
      }
    });

    boardEl.appendChild(rowEl);
  });
}

function showError(msg) {
  errorBox.textContent = msg || "";
}

function doGenerate(makePuzzleToo) {
  showError("");

  const valid = validateSymbols(symbolInput.value);
  if (!valid.ok) {
    showError(valid.message);
    return;
  }

  const symbols = valid.symbols;
  const cluesToKeep = parseInt(difficultySelect.value, 10);

  let solution = null;
  for (let tries = 0; tries < 50; tries++) {
    solution = generateSolution(symbols);
    if (solution) break;
  }

  if (!solution) {
    showError("Could not generate a valid solution. Try again.");
    return;
  }

  renderBoard(solutionBoardEl, solution, false);

  if (makePuzzleToo) {
    const puzzle = generatePuzzleFromSolution(solution, symbols, cluesToKeep);
    renderBoard(puzzleBoardEl, puzzle, true);
  } else {
    renderBoard(puzzleBoardEl, Array(positions.length).fill(null), true);
  }
}

generateBtn.addEventListener("click", function () {
  doGenerate(true);
});

solutionBtn.addEventListener("click", function () {
  doGenerate(false);
});

symbolInput.value = "ABCDE";
renderBoard(puzzleBoardEl, Array(positions.length).fill(null), true);
renderBoard(solutionBoardEl, Array(positions.length).fill(null), true);
</script>

</body>
</html>
