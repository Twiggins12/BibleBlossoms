<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10-Symbol Shaped Wordoku Generator</title>
  <style>
    :root{
      --bg:#f6f6fb;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --block-gap:24px;
      --row-gap:28px;
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1600px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
      padding:20px;
      margin-bottom:20px;
    }

    h1{
      margin:0 0 10px 0;
      font-size:2rem;
    }

    p{
      margin:8px 0;
      line-height:1.45;
    }

    .muted{
      color:var(--muted);
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:14px;
    }

    .controls input,
    .controls button{
      font-size:16px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .controls button{
      cursor:pointer;
      background:#f2f2f7;
    }

    .controls button:hover{
      background:#e8e8ef;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid #ddd;
      border-radius:999px;
      padding:6px 10px;
      background:#fafafa;
      font-size:14px;
    }

    .swatch{
      width:18px;
      height:18px;
      border-radius:4px;
      border:1px solid rgba(0,0,0,0.25);
      flex:none;
    }

    .board-wrap{
      overflow:auto;
      padding:10px 0;
    }

    .puzzle{
      width:max-content;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4, auto);
      grid-template-areas:
        "b0 b1 b2 b3"
        ".  b4 b5 ."
        "b6 b7 b8 b9";
      column-gap:var(--block-gap);
      row-gap:var(--row-gap);
      align-items:start;
      justify-items:center;
    }

    .block-holder{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .block-0{ grid-area:b0; }
    .block-1{ grid-area:b1; }
    .block-2{ grid-area:b2; }
    .block-3{ grid-area:b3; }
    .block-4{ grid-area:b4; }
    .block-5{ grid-area:b5; }
    .block-6{ grid-area:b6; }
    .block-7{ grid-area:b7; }
    .block-8{ grid-area:b8; }
    .block-9{ grid-area:b9; }

    svg{
      display:block;
    }

    @media print{
      body{ background:#fff; }
      .no-print{ display:none !important; }
      .wrap{ max-width:none; padding:0; }
      .card{ box-shadow:none; border:none; padding:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card no-print">
      <h1>10-Symbol Shaped Wordoku Generator</h1>
      <p>
        Block shape: 4 cells / 2 wide cells / 4 cells.
      </p>
      <p>
        Puzzle layout: 4 blocks on top, 2 centered in the middle, 4 on bottom.
      </p>
      <p class="muted">
        Each block contains all 10 symbols once. The generator also avoids repeats
        across the 10 matching positions from block to block.
      </p>

      <div class="controls">
        <label>
          Symbols:
          <input id="symbolsInput" type="text" value="ABCDEFGHIJ" size="14" />
        </label>

        <label>
          Clues:
          <input id="cluesInput" type="number" min="10" max="100" value="42" />
        </label>

        <button id="newBtn">New Solution + Puzzle</button>
        <button id="sameBtn">New Puzzle Same Solution</button>
        <button id="toggleBtn">Show Solution</button>
        <button id="printBtn">Print</button>
      </div>

      <div class="legend" id="legend"></div>
    </div>

    <div class="card">
      <div class="board-wrap">
        <div class="puzzle" id="puzzle"></div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = [
      "#fff3b0",
      "#c8f7c5",
      "#ffd6a5",
      "#d0ebff",
      "#f8c8dc",
      "#e9d5ff",
      "#c7f9cc",
      "#fde2e4",
      "#bee1e6",
      "#e2ece9"
    ];

    const CELL = 54;
    const WIDE = CELL * 2;
    const BLOCK_W = CELL * 4;
    const BLOCK_H = CELL * 3;
    const STROKE = 2;
    const OUTER = 4;

    let currentSolution = null;
    let currentPuzzle = null;
    let showingSolution = false;

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getSymbols(){
      const raw = document.getElementById("symbolsInput").value.trim();
      const chars = [...raw];

      if(chars.length !== 10){
        alert("Please enter exactly 10 symbols.");
        return null;
      }
      if(new Set(chars).size !== 10){
        alert("All 10 symbols must be different.");
        return null;
      }
      return chars;
    }

    function clampClues(n){
      if(Number.isNaN(n)) return 42;
      return Math.max(10, Math.min(100, n));
    }

    function buildLatin(symbols){
      const n = 10;
      const rowPerm = shuffle([...Array(n).keys()]);
      const colPerm = shuffle([...Array(n).keys()]);
      const symPerm = shuffle([...Array(n).keys()]);

      return Array.from({length:n}, (_, r) =>
        Array.from({length:n}, (_, c) => {
          const base = (rowPerm[r] + colPerm[c]) % n;
          return symbols[symPerm[base]];
        })
      );
    }

    function makeSolution(symbols){
      const latin = buildLatin(symbols);

      const blocks = Array.from({length:10}, (_, blockIndex) =>
        Array.from({length:10}, (_, posIndex) => latin[posIndex][blockIndex])
      );

      return { symbols, blocks };
    }

    function makePuzzle(solution, clues){
      const blocks = solution.blocks.map(block => [...block]);
      const coords = [];

      for(let b = 0; b < 10; b++){
        for(let p = 0; p < 10; p++){
          coords.push({b, p});
        }
      }

      const shuffled = shuffle(coords);
      const hideCount = 100 - clues;

      for(let i = 0; i < hideCount; i++){
        const {b, p} = shuffled[i];
        blocks[b][p] = "";
      }

      return { symbols: solution.symbols, blocks };
    }

    function makeLegend(){
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      COLORS.forEach((color, i) => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.background = color;

        const text = document.createElement("span");
        text.textContent = `Block ${i + 1}`;

        item.appendChild(swatch);
        item.appendChild(text);
        legend.appendChild(item);
      });
    }

    function svgEl(name, attrs = {}){
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for(const [k, v] of Object.entries(attrs)){
        el.setAttribute(k, v);
      }
      return el;
    }

    function addRect(svg, x, y, w, h, fill, strokeWidth = STROKE){
      const r = svgEl("rect", {
        x, y, width:w, height:h,
        fill,
        stroke:"#222",
        "stroke-width":strokeWidth
      });
      svg.appendChild(r);
    }

    function addText(svg, x, y, text, hidden = false){
      const t = svgEl("text", {
        x, y,
        "text-anchor":"middle",
        "dominant-baseline":"middle",
        "font-family":"Arial, Helvetica, sans-serif",
        "font-size":"28",
        "font-weight":"700",
        fill: hidden ? "transparent" : "#222"
      });
      t.textContent = text || "";
      svg.appendChild(t);
    }

    function renderBlock(values, blockIndex){
      const color = COLORS[blockIndex];
      const holder = document.createElement("div");
      holder.className = `block-holder block-${blockIndex}`;

      const svg = svgEl("svg", {
        width: BLOCK_W,
        height: BLOCK_H,
        viewBox: `0 0 ${BLOCK_W} ${BLOCK_H}`
      });

      // outer border
      addRect(svg, 0, 0, BLOCK_W, BLOCK_H, "white", OUTER);

      // top row: positions 0,1,2,3
      for(let i = 0; i < 4; i++){
        const x = i * CELL;
        const y = 0;
        addRect(svg, x, y, CELL, CELL, color);
        addText(svg, x + CELL / 2, y + CELL / 2, values[i], !values[i]);
      }

      // middle row: positions 4,5 as 2 wide cells
      addRect(svg, 0, CELL, WIDE, CELL, color);
      addText(svg, WIDE / 2, CELL + CELL / 2, values[4], !values[4]);

      addRect(svg, WIDE, CELL, WIDE, CELL, color);
      addText(svg, WIDE + WIDE / 2, CELL + CELL / 2, values[5], !values[5]);

      // bottom row: positions 6,7,8,9
      for(let i = 0; i < 4; i++){
        const x = i * CELL;
        const y = CELL * 2;
        addRect(svg, x, y, CELL, CELL, color);
        addText(svg, x + CELL / 2, y + CELL / 2, values[i + 6], !values[i + 6]);
      }

      holder.appendChild(svg);
      return holder;
    }

    function render(){
      const puzzle = document.getElementById("puzzle");
      puzzle.innerHTML = "";

      const data = showingSolution ? currentSolution : currentPuzzle;
      if(!data) return;

      for(let b = 0; b < 10; b++){
        puzzle.appendChild(renderBlock(data.blocks[b], b));
      }
    }

    function newSolutionAndPuzzle(){
      const symbols = getSymbols();
      if(!symbols) return;

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentSolution = makeSolution(symbols);
      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function newPuzzleSameSolution(){
      if(!currentSolution){
        newSolutionAndPuzzle();
        return;
      }

      const cluesInput = document.getElementById("cluesInput");
      const clues = clampClues(parseInt(cluesInput.value, 10));
      cluesInput.value = clues;

      currentPuzzle = makePuzzle(currentSolution, clues);
      showingSolution = false;
      document.getElementById("toggleBtn").textContent = "Show Solution";
      render();
    }

    function toggleSolution(){
      if(!currentSolution) return;
      showingSolution = !showingSolution;
      document.getElementById("toggleBtn").textContent =
        showingSolution ? "Show Puzzle" : "Show Solution";
      render();
    }

    document.getElementById("newBtn").addEventListener("click", newSolutionAndPuzzle);
    document.getElementById("sameBtn").addEventListener("click", newPuzzleSameSolution);
    document.getElementById("toggleBtn").addEventListener("click", toggleSolution);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    makeLegend();
    newSolutionAndPuzzle();
  </script>
</body>
</html>
