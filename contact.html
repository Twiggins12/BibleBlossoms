<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bible Blossoms | Contact</title>

<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<style>
  .contact-container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .contact-container h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .contact-container label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }

  .contact-container input,
  .contact-container textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  .contact-container textarea {
    min-height: 150px;
    resize: vertical;
  }

  .contact-container button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #6a4caf;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  .contact-container button:hover {
    background: #563a94;
  }

  .required {
    color: red;
  }
</style>
</head>

<body>

<header id="top">
  <h1>Bible Blossoms</h1>
</header>

<div class="page-content">

  <div class="contact-container">
    <h2>Contact</h2>

    <div class="contact-form-container">
  <p>Please use the form below to contact Bible Blossoms.</p>

  <form id="contact-form">
    <label for="first_name">First Name (optional)</label>
    <input type="text" id="first_name" name="first_name">

    <label for="reply_to">Email Address <span class="required">*</span></label>
    <input type="email" id="reply_to" name="reply_to" required>

    <label for="message">Message <span class="required">*</span></label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="status-message" style="margin-top:15px;"></p>
</div>
  </div>

</div>
  <!-- Footer -->
  <footer class="site-footer">
    <a href="index.html">Home</a>
    <a href="life_link.html">Life Link</a>
    <a href="bible_journaling.html">Bible Journaling</a>
    <a href="wordoku.html">WORDokus</a>
    <a href="mazes.html">Mazes</a>
    <a href="coloring_pages.html">Coloring Pages</a>
    <a href="bible_reading_plans.html">Bible Reading Plans</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="#top">Top</a>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5nGnc1xrfuRMwghbt");
})();

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm("service_1xyb6ys", "template_7df9icd", this)
    .then(function() {
      document.getElementById("status-message").innerText = "Message sent successfully!";
    }, function(error) {
      document.getElementById("status-message").innerText = "Failed to send message.";
      console.error("EmailJS Error:", error);
    });
});
</script>
</body>
</html>
