<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Blossoms | 4x4 WORDoku</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/wordoku.css">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
</head>
<body>

<header id="top">
  <h1>Bible Blossoms</h1>
</header>

<div class="page-content">
  <div id="domain-top-left">
    <a href="../index.html">BibleBlossoms</a>
  </div>

  <section class="hero">
    <h2>4x4 WORDoku</h2>
    <p>Download or print freely.</p>
  </section>

  <div class="cards-container">

        <!-- Puzzle 1 -->
    <div class="card">
      <h3>Puzzle 1</h3>
      <img src="../images/4x4_book_life.png" alt="4x4 WORDoku Puzzle 1 preview">
      <div class="card-buttons">
        <a href="../downloads/wordoku/4x4_book_life.pdf" download>Download</a>
        <a href="../images/4x4_book_life.png" class="print-btn">Print</a>
        <a href="#" class="show-answer-btn">Answer</a>
      </div>
      <div class="solution" style="display:none; margin-top:10px;">
        <img src="../images/4x4_book_life_solution.png" alt="Puzzle 1 solution">
      </div>
    </div>
    
  </div>
</div>

<footer class="site-footer">
  <a href="../index.html">Home</a>
  <a href="../life_link.html">Life Link</a>
  <a href="../wordoku.html">WORDoku</a>
  <a href="../mazes.html">Mazes</a>
  <a href="../coloring_pages.html">Coloring Pages</a>
  <a href="../about.html">About</a>
  <a href="#top">Top</a>
</footer>
<script>
  // Show/hide answer
  document.querySelectorAll('.show-answer-btn').forEach(button => {
    button.addEventListener('click', function(e) {
      e.preventDefault();
      const card = this.closest('.card');
      const solution = card.querySelector('.solution');

      if (solution.style.display === 'none' || solution.style.display === '') {
        solution.style.display = 'block';
      } else {
        solution.style.display = 'none';
      }
    });
  });

  // Print image
  document.querySelectorAll('.print-btn').forEach(button => {
    button.addEventListener('click', function(e) {
      e.preventDefault();
      const imageUrl = this.getAttribute('href');
      const printWindow = window.open('', '_blank');

      printWindow.document.write(`
        <html>
          <head>
            <title>Print Puzzle</title>
          </head>
          <body style="margin:0; text-align:center;">
            <img src="${imageUrl}" style="max-width:100%; height:auto;">
          </body>
        </html>
      `);

      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    });
  });
</script>
</body>
</html>
